# fly.toml — Product Scout
# Voice-enabled product chat bot with Claude agent loop + Speechmatics transcription.
#
# Deploy:  fly launch --config product-bot/fly.toml
# Secrets: fly secrets set ANTHROPIC_KEY=... SPEECHMATICS_KEY=...
#          (API keys can also be supplied per-request via the browser UI)

app            = 'product-scout'
primary_region = 'arn'

[build]

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory   = '256mb'
  cpu_kind = 'shared'
  cpus     = 1
